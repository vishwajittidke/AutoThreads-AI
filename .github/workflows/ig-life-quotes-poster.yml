name: AutoThreads-AI (Life Quotes Poster)

on:
  schedule:
    - cron: '30 4,14 * * *'  # Runs at 10:00 AM and 8:00 PM IST
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Execute Instagram Engine
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          INSTAGRAM_ACCESS_TOKEN_LIFE_QUOTES: ${{ secrets.INSTAGRAM_ACCESS_TOKEN_LIFE_QUOTES }}
          INSTAGRAM_USER_ID_LIFE_QUOTES: ${{ secrets.INSTAGRAM_USER_ID_LIFE_QUOTES }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node src/index_life_quotes.js --target ig
