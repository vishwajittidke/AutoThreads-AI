# ══════════════════════════════════════════════════════════════════════════════
# AutoThreads-AI v3.0 — GitHub Actions Workflow
# Zero-Cost Autonomous Content Publisher for Instagram Threads
# ══════════════════════════════════════════════════════════════════════════════
#
# This workflow runs daily via cron to generate and publish AI-powered content
# to Instagram Threads using Google Gemini and Meta Graph API.
# All execution happens within GitHub's free tier runner minutes.

name: "AutoThreads-AI: Daily Post"

on:
  # ─── Scheduled Trigger ──────────────────────────────────────────────────────
  # Runs daily at 06:30 UTC (off-peak global traffic window)
  # Note: GitHub Actions cron can have delays of 5-15 minutes in the free queue
  schedule:
    - cron: "30 6 * * *"

  # ─── Manual Trigger Override ────────────────────────────────────────────────
  # Allows on-demand execution for debugging, testing, and token sync
  workflow_dispatch:

# ─── Repository Permissions ──────────────────────────────────────────────────
# Write access required for the self-writing state persistence engine
# (git commit/push of state.json back to main branch)
permissions:
  contents: write

jobs:
  post-to-threads:
    name: "Generate & Publish"
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      # ─── Step 1: Repository Checkout ──────────────────────────────────────
      # Pinned to exact SHA hash for supply-chain security
      - name: "📥 Checkout Repository"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ─── Step 2: Node.js Runtime Setup ────────────────────────────────────
      # Using Node 20 LTS for native fetch API support
      - name: "⚙️ Setup Node.js 20"
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      # ─── Step 3: Execute Main Workflow ────────────────────────────────────
      # Runs the autonomous content pipeline with all secrets injected
      - name: "🚀 Run AutoThreads-AI Pipeline"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          NOTIFICATION_WEBHOOK: ${{ secrets.NOTIFICATION_WEBHOOK }}
        run: node src/index.js
